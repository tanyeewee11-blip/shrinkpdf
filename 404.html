<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="shared.css">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found – ShrinkPDF</title>
<meta name="description" content="The page you're looking for doesn't exist. Head back to ShrinkPDF to compress, merge, split, or rotate your PDFs for free.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"></noscript>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
@media(max-width:640px) {
}
main {
  position: relative; z-index: 1;
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 120px 24px 80px;
}
.error-code {
  font-family: 'Syne', sans-serif;
  font-size: clamp(6rem, 20vw, 10rem);
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
  letter-spacing: -4px;
}
.error-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 700;
  margin-bottom: 14px;
}
.error-desc {
  font-size: 1rem;
  color: var(--text-muted);
  max-width: 420px;
  line-height: 1.7;
  margin-bottom: 40px;
}
.btn-home {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 1rem; padding: 14px 32px; border-radius: 12px;
  text-decoration: none; transition: opacity 0.2s; margin-bottom: 48px;
}
.btn-home:hover { opacity: 0.88; }
.tool-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 16px;
  font-size: 0.85rem; text-decoration: none; color: var(--text-muted);
  transition: all 0.2s;
}
.tool-chip:hover { color: var(--text); border-color: var(--accent); transform: translateY(-2px); }
.tools-label {
  font-size: 0.78rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 14px;
}
footer {
  position: relative; z-index: 1;
  text-align: center; padding: 20px 24px;
  font-size: 0.78rem; color: var(--text-muted);
  border-top: 1px solid var(--border);
}
</style>
<script src="components.js" defer></script>
</head>
<body>

<nav id="site-nav"></nav>

<main id="main-content">
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-desc">Looks like this page doesn't exist or has been moved. Head back to ShrinkPDF and keep compressing!</p>
  <a href="/" class="btn-home">🗜️ Back to ShrinkPDF</a>
  <p class="tools-label">Or go directly to a tool</p>
  <div class="tools-grid">
    <a href="merge" class="tool-chip">🔗 Merge PDF</a>
    <a href="split" class="tool-chip">✂️ Split PDF</a>
    <a href="rotate" class="tool-chip">🔄 Rotate PDF</a>
    <a href="pdf-to-images" class="tool-chip">🖼️ PDF to Images</a>
    <a href="images-to-pdf" class="tool-chip">📷 Images to PDF</a>
    <a href="reorder" class="tool-chip">📋 Reorder Pages</a>
  </div>
</main>
<footer id="site-footer"></footer>

</body>
</html>
